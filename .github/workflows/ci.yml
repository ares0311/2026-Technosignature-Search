name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TECHNO_SEARCH_ENABLE_LIVE_DATA: "0"
  PYTHONWARNINGS: default

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev,science]"

      - name: Run six-shard tests and validation
        run: python scripts/run_parallel_validation.py
