name: Weekly Anomaly Scan

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated target names to scan (blank = all)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  TECHNO_SEARCH_ENABLE_LIVE_DATA: "0"
  PYTHONWARNINGS: default
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    name: Anomaly Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev,science]"

      - name: Run validate-all (must pass before scanning)
        run: python -m techno_search.cli validate-all

      - name: Run review dashboard pre-check
        run: python -m techno_search.cli review-dashboard || true

      - name: Run scan summary on cached hit tables
        run: |
          SCAN_DATE=$(date +%Y%m%d)
          mkdir -p results/scans/${SCAN_DATE}
          if [ -d data/bl_hits ]; then
            echo "[INFO] Scanning BL hit tables in data/bl_hits/"
            python -m techno_search.cli scan-summary data/bl_hits/ \
              2>&1 | tee results/scans/${SCAN_DATE}/scan_summary.txt || true
          else
            echo "[INFO] No BL hit tables found — scan-summary skipped"
            echo '{"ok": false, "reason": "no_data", "total_candidates": 0}' \
              > results/scans/${SCAN_DATE}/scan_summary.json
          fi
          echo "SCAN_DATE=${SCAN_DATE}" >> $GITHUB_ENV

      - name: Check for escalation-worthy candidates
        run: |
          if [ -d results/scans/${SCAN_DATE} ]; then
            echo "[INFO] Checking escalation gate on any candidate review packets"
            find results/scans/${SCAN_DATE} -name "*_manifest.json" | \
              while read f; do
                python -m techno_search.cli escalation-gate-check "$f" 2>/dev/null || true
              done
          fi

      - name: Commit scan results (if any new files)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/scans/ || true
          git diff --cached --quiet || \
            git commit -m "Weekly scan results ${SCAN_DATE} [skip ci]"
          git push origin main || echo "[INFO] Nothing to push"

      - name: Post scan summary to job summary
        run: |
          echo "## Weekly Anomaly Scan — ${SCAN_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scientific guardrail:** No result in this scan constitutes a detection claim or authorizes external submission." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/scans/${SCAN_DATE}/scan_summary.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results/scans/${SCAN_DATE}/scan_summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No scan summary produced." >> $GITHUB_STEP_SUMMARY
          fi
