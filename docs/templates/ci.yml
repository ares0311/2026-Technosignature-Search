# GitHub Actions CI template.
#
# Copy this file to `.github/workflows/ci.yml` only when the publishing token has
# GitHub `workflow` scope. Keeping it in docs/templates avoids push rejection for
# tokens without that scope.

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest -m "not integration_live" --cov=techno_search --cov-report=term-missing

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src
